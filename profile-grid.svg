<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" role="img" aria-labelledby="title desc">
  <title id="title">Rajeev Nayan Profile Banner</title>
  <desc id="desc">Interactive-style profile banner for Rajeev Nayan, Full Stack Developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0d1728"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .panel { fill: #0f1b2d; stroke: #1f3654; stroke-width: 1; filter: url(#softShadow); }
      .soft { fill: #12233a; stroke: #254262; stroke-width: 1; }
      .title { font: 800 54px 'Segoe UI', Ubuntu, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 600 20px 'Segoe UI', Ubuntu, sans-serif; fill: #9cc7e8; }
      .label { font: 700 13px 'Segoe UI', Ubuntu, sans-serif; fill: #94a3b8; }
      .value { font: 800 24px 'Segoe UI', Ubuntu, sans-serif; fill: #f8fafc; }
      .small { font: 600 14px 'Segoe UI', Ubuntu, sans-serif; fill: #cbd5e1; }
      .tiny { font: 600 12px 'Segoe UI', Ubuntu, sans-serif; fill: #8aa4bf; }
      .pillText { font: 700 13px 'Segoe UI', Ubuntu, sans-serif; fill: #e2e8f0; }
      .accentStroke { stroke: url(#accent); stroke-width: 3; fill: none; stroke-linecap: round; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
      .float { animation: float 5s ease-in-out infinite; }
      .scan { animation: scan 5.5s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: .45; transform: scale(.96); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes scan { 0% { transform: translateX(-220px); opacity: 0; } 20% { opacity: .8; } 80% { opacity: .8; } 100% { transform: translateX(1180px); opacity: 0; } }
    </style>
  </defs>

  <rect class="bg" width="1180" height="430" rx="24"/>
  <circle cx="176" cy="92" r="190" fill="url(#glow)" opacity="0.7"/>
  <circle cx="1020" cy="340" r="210" fill="#22c55e" opacity="0.08"/>
  <rect class="scan" x="0" y="0" width="180" height="430" fill="#ffffff" opacity="0.05"/>

  <g transform="translate(46 42)">
    <rect class="panel" width="500" height="346" rx="20"/>
    <path class="accentStroke" d="M30 70 C95 15, 175 15, 240 70 S385 125, 455 70"/>
    <circle class="pulse" cx="76" cy="74" r="8" fill="#38bdf8"/>
    <circle class="pulse" cx="244" cy="70" r="8" fill="#22c55e"/>
    <circle class="pulse" cx="426" cy="74" r="8" fill="#f59e0b"/>

    <text class="title" x="30" y="142">Rajeev Nayan</text>
    <text class="subtitle" x="34" y="178">Full Stack Developer | Java | Spring Boot | React</text>
    <text class="small" x="34" y="215">Building secure backends, clean frontends, and DSA discipline.</text>

    <g transform="translate(34 248)">
      <rect width="124" height="42" rx="21" fill="#12324c" stroke="#255f86"/>
      <text class="pillText" x="62" y="27" text-anchor="middle">Spring Boot</text>
      <rect x="136" width="92" height="42" rx="21" fill="#14351f" stroke="#2f7d3d"/>
      <text class="pillText" x="182" y="27" text-anchor="middle">React</text>
      <rect x="240" width="92" height="42" rx="21" fill="#33280d" stroke="#9a711b"/>
      <text class="pillText" x="286" y="27" text-anchor="middle">Java</text>
      <rect x="344" width="106" height="42" rx="21" fill="#2b1d3b" stroke="#7051a5"/>
      <text class="pillText" x="397" y="27" text-anchor="middle">DSA</text>
    </g>
  </g>

  <g transform="translate(585 42)">
    <rect class="panel" width="548" height="158" rx="20"/>
    <text class="label" x="28" y="36">CURRENT FOCUS</text>
    <text class="value" x="28" y="74">Microservices, JWT Auth, React 18</text>
    <text class="small" x="28" y="105">Quietly improving one problem, one API, one deployment at a time.</text>
    <g transform="translate(28 124)">
      <rect width="150" height="10" rx="5" fill="#1e293b"/>
      <rect width="118" height="10" rx="5" fill="#38bdf8"/>
      <rect x="168" width="150" height="10" rx="5" fill="#1e293b"/>
      <rect x="168" width="102" height="10" rx="5" fill="#22c55e"/>
      <rect x="336" width="150" height="10" rx="5" fill="#1e293b"/>
      <rect x="336" width="128" height="10" rx="5" fill="#f59e0b"/>
    </g>
  </g>

  <g transform="translate(585 224)">
    <rect class="soft" width="164" height="132" rx="18"/>
    <text class="label" x="20" y="34">OPEN SOURCE</text>
    <text class="value" x="20" y="74">Projects</text>
    <text class="tiny" x="20" y="104">Readmify, clones, tools</text>
  </g>
  <g transform="translate(777 224)">
    <rect class="soft" width="164" height="132" rx="18"/>
    <text class="label" x="20" y="34">PRACTICE</text>
    <text class="value" x="20" y="74">DSA</text>
    <text class="tiny" x="20" y="104">LeetCode, GFG, Codolio</text>
  </g>
  <g transform="translate(969 224)">
    <rect class="soft" width="164" height="132" rx="18"/>
    <text class="label" x="20" y="34">SHIPPING</text>
    <text class="value" x="20" y="74">Web Apps</text>
    <text class="tiny" x="20" y="104">React + Spring Boot</text>
  </g>

  <g class="float" transform="translate(72 348)">
    <text class="tiny" x="0" y="0">Portfolio: rajeevnayan.in</text>
    <text class="tiny" x="220" y="0">GitHub: imrajeevnayan</text>
    <text class="tiny" x="430" y="0">Mail: imrajeevnayan@gmail.com</text>
  </g>
</svg>
