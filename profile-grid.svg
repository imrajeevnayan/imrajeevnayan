<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 385" width="100%" height="385">
  <defs>
    <!-- Dark glass theme gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .terminal-window {
      stroke: #1e293b;
      stroke-width: 1.5;
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.6));
    }
    .title {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      font-size: 20px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      fill: #00F2FE;
      font-weight: 600;
    }
    .ascii-text {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 8px;
      fill: url(#textGrad);
      font-weight: bold;
      line-height: 1.1;
    }
    .label {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      fill: #64748b;
    }
    .value {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      fill: #e2e8f0;
      font-weight: 600;
    }
    .value-highlight {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      fill: #38bdf8;
      font-weight: bold;
    }
    .stat-label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      fill: #94a3b8;
    }
    .stat-val {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      fill: #ffffff;
      font-weight: 800;
    }
    .divider {
      stroke: #1e293b;
      stroke-width: 1;
    }
    .tech-pill {
      fill: #1e293b;
      rx: 4;
    }
    .tech-text {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      fill: #94a3b8;
    }
  </style>

  <!-- Background window -->
  <rect class="terminal-window" x="5" y="5" width="840" height="375" rx="12" fill="url(#bgGrad)"/>

  <!-- Top bar / Title Bar -->
  <rect x="5" y="5" width="840" height="35" rx="12" fill="#0d1527"/>
  <!-- Top bar buttons -->
  <circle cx="25" cy="22" r="6" fill="#ef4444"/>
  <circle cx="45" cy="22" r="6" fill="#eab308"/>
  <circle cx="65" cy="22" r="6" fill="#22c55e"/>
  
  <text x="425" y="27" font-family="'Fira Code', monospace" font-size="12" fill="#475569" text-anchor="middle">rajeevnayan@profile-matrix:~</text>

  <!-- Left: ASCII Portrait Container -->
  <rect x="25" y="60" width="370" height="300" rx="8" fill="#070a12" stroke="#1e293b" stroke-width="1"/>
  <svg x="35" y="70" width="350" height="280">
    <text class="ascii-text" xml:space="preserve">%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%@@@@@@@@@@@@@@@@@@@@@#######@@@@@@@@@@@@@@@@@@@@@@@
%@%%%%%%%%%%%%%%@%:=''       .'-+#%@%%%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%@#-                -#@%%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%:.            . .....+%%%%%%%%%%%%%%@
%@%%%%%%%%%%%%*    ..      '..... '' :@%%%%%%%%%%%%@
%@%%%%%%%%%%%%-    .'.'''-===++-.. . '%%%%%%%%%%%%%@
%@%%%%%%%%%%%%'    '=====+++:**::+-...*@%%%%%%%%%%%@
%@%%%%%%%%%%%@:  .'--=++::**:::++++'. :@%%%%%%%%%%%@
%@%%%%%%%%%%%%@'.='-----+:::+=----=+.'%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%:'-======+=++++==+++='*%%%%%%%%%%%%%@
%@%%%%%%%%%%%%*=-=+===+++=:++:+-++:++:#%%%%%%%%%%%%@
%@%%%%%%%%%%%%%+-=+:::::=+*:+:****:+:*%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%#==++:::+++**+::**::::%%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%@*=++:::+==+++:***:*+#%%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%%#-=++-----=----=:*:=%%%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%%%+'=='-''-==---'-:-:%%%%%%%%%%%%%%%@
%@%%%%%%%%%%%%%%@%-.-+::+===+**+--=%@%%%%%%%%%%%%%%@
%@%%%%%%%%%%%@@%*'-'.'=++===::=''+:'*%@@%%%%%%%%%%%@
%@%%%%%%@@@%#:+'  :=-..''..''''-:*%. -+*#%@@@%%%%%%@
%@%%@@%%*+-.      ::=--'''''-=+::%#.    .'=:#%@@@@%@
%@#*:='.          =#*+====++::::#@:          '-+:#%@
--.               -##%:::::::::#%@+ .            .'=
                  '*#**##**::#%**%- ...             
                   :######*+:%%##*.             ... 
                   :%%%%%%#*#%%%%: . .           .  
                   -%#%%%%%%%%%%%= ...           .  
                   '%%%@@@@@@@@@%' ... .        .   
</text>
  </svg>

  <!-- Divider -->
  <line class="divider" x1="415" y1="60" x2="415" y2="360" />

  <!-- Right Side: User Details -->
  
  <!-- Header: Avatar Name & Username -->
  <g transform="translate(435, 80)">
    <!-- Custom Avatar Border Indicator -->
    <rect x="-2" y="-2" width="44" height="44" rx="8" fill="none" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>
    <image href="https://avatars.githubusercontent.com/u/95278277?v=4" x="0" y="0" width="40" height="40" rx="6"/>
    
    <text class="title" x="55" y="20">RAJEEV NAYAN</text>
    <text class="subtitle" x="55" y="36">@imrajeevnayan</text>
  </g>

  <!-- Role Badge -->
  <g transform="translate(435, 140)">
    <rect x="0" y="0" width="165" height="22" rx="11" fill="rgba(0, 242, 254, 0.1)" stroke="rgba(0, 242, 254, 0.3)" stroke-width="1"/>
    <text x="12" y="15" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#00F2FE">FULL STACK DEVELOPER</text>
  </g>

  <!-- Stats Grid -->
  <g transform="translate(435, 180)">
    <!-- Stars -->
    <g transform="translate(0, 0)">
      <text class="stat-val" x="0" y="20">49</text>
      <text class="stat-label" x="0" y="36">GitHub Stars</text>
      <path d="M0 -5 L2 -1 L7 -1 L3 2 L5 7 L0 4 L-5 7 L-3 2 L-7 -1 L-2 -1 Z" fill="#eab308" transform="translate(70, 10) scale(1.2)" filter="url(#glow)"/>
    </g>
    
    <!-- Repos -->
    <g transform="translate(130, 0)">
      <text class="stat-val" x="0" y="20">70</text>
      <text class="stat-label" x="0" y="36">Repositories</text>
    </g>
    
    <!-- Followers -->
    <g transform="translate(250, 0)">
      <text class="stat-val" x="0" y="20">6</text>
      <text class="stat-label" x="0" y="36">Followers</text>
    </g>
  </g>

  <!-- Tech Stack Grid -->
  <g transform="translate(435, 250)">
    <text class="label" x="0" y="12">~ /skills</text>
    
    <!-- Row 1 -->
    <g transform="translate(0, 25)">
      <!-- Spring Boot -->
      <g transform="translate(0, 0)">
        <rect class="tech-pill" x="0" y="0" width="90" height="20"/>
        <text class="tech-text" x="10" y="14">Spring Boot</text>
      </g>
      <!-- React -->
      <g transform="translate(98, 0)">
        <rect class="tech-pill" x="0" y="0" width="55" height="20"/>
        <text class="tech-text" x="10" y="14">React</text>
      </g>
      <!-- Java -->
      <g transform="translate(161, 0)">
        <rect class="tech-pill" x="0" y="0" width="50" height="20"/>
        <text class="tech-text" x="10" y="14">Java</text>
      </g>
      <!-- Docker -->
      <g transform="translate(219, 0)">
        <rect class="tech-pill" x="0" y="0" width="60" height="20"/>
        <text class="tech-text" x="10" y="14">Docker</text>
      </g>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 52)">
      <!-- MySQL -->
      <g transform="translate(0, 0)">
        <rect class="tech-pill" x="0" y="0" width="55" height="20"/>
        <text class="tech-text" x="10" y="14">MySQL</text>
      </g>
      <!-- AWS -->
      <g transform="translate(63, 0)">
        <rect class="tech-pill" x="0" y="0" width="45" height="20"/>
        <text class="tech-text" x="10" y="14">AWS</text>
      </g>
      <!-- JavaScript -->
      <g transform="translate(116, 0)">
        <rect class="tech-pill" x="0" y="0" width="85" height="20"/>
        <text class="tech-text" x="10" y="14">JavaScript</text>
      </g>
      <!-- Microservices -->
      <g transform="translate(209, 0)">
        <rect class="tech-pill" x="0" y="0" width="100" height="20"/>
        <text class="tech-text" x="10" y="14">Microservices</text>
      </g>
    </g>
  </g>

  <!-- Location / Web -->
  <g transform="translate(435, 345)">
    <text class="value-highlight" x="0" y="0">rajeev@INDIA:~ <tspan fill="#e2e8f0" font-family="'Inter', sans-serif" font-weight="600">rajeevnayan.in</tspan></text>
  </g>

</svg>
