name: Update DSA Stats Card

on:
  schedule: # execute every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

# Prevent parallel runs from conflicting
concurrency:
  group: update-dsa-stats
  cancel-in-progress: true

jobs:
  update-dsa-stats-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Stats and Save SVG
        run: |
          # Fetch with timeout and validate SVG content
          curl -s --max-time 15 -o dsa-stats-temp.svg https://dsastats.vercel.app/api/codolio/imrajeevnayan || true
          if [ -s dsa-stats-temp.svg ] && grep -q "<svg" dsa-stats-temp.svg; then
            mv dsa-stats-temp.svg dsa-stats.svg
          else
            echo "Fetch timed out or returned invalid payload. Preserving existing SVG."
          fi
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add dsa-stats.svg
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes in stats card. Skipping commit."
          else
            git commit -m "Update stats card $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${{ github.ref_name }}
          fi
