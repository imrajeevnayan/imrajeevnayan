name: Update DSA Stats Card

on:
  schedule: # execute every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:

# Prevent parallel runs from conflicting
concurrency:
  group: update-dsa-stats
  cancel-in-progress: true

jobs:
  update-dsa-stats-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Dynamic Stats SVG
        run: |
          node scripts/generate-dsa-stats.js

          # Force GitHub README image cache to refresh after each scheduled/manual update.
          cache_buster="$(date -u +'%Y%m%d%H%M')"
          perl -0pi -e "s#dsa-stats\\.svg\\?v=[0-9]+#dsa-stats.svg?v=$cache_buster#g" README.md
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add dsa-stats.svg README.md
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes in stats card. Skipping commit."
          else
            git commit -m "Update stats card $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${{ github.ref_name }}
          fi
